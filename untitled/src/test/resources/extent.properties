# Extent Reports Configuration
extent.reporter.html.start=true
extent.reporter.html.out=reports/ExtentReport.html

extent.reporter.json.start=false
extent.reporter.json.out=reports/ExtentReport.json

# System Info displayed in report
systeminfo.OS=${os.name}
systeminfo.Java=${java.version}
systeminfo.Browser=Chrome
systeminfo.Environment=QA
systeminfo.Author=Automation Team
