# ============================================================
# Application Configuration
# ============================================================

# Application URL
app.url=https://your-application-url.com

# Browser: chrome | edge | headless
browser=chrome

# Implicit/Explicit Wait Timeout (seconds)
timeout=20

# Page Load Timeout (seconds)
page.load.timeout=30

# ============================================================
# Credentials
# ============================================================
admin.username=admin@company.com
admin.password=Admin@123

employee.username=employee@company.com
employee.password=Employee@123

# ============================================================
# Paths
# ============================================================
download.path=downloads
screenshot.path=reports/screenshots
extent.report.path=reports/ExtentReport.html

# ============================================================
# Driver Paths (place driver executables in the drivers/ folder)
# Mac/Linux: drivers/chromedriver
# Windows:   drivers/chromedriver.exe
# ============================================================
chromedriver.path=drivers/chromedriver
edgedriver.path=drivers/msedgedriver

# ============================================================
# Test Data
# ============================================================
employee.number=EMP001
report.name=Monthly Payroll Report
report.month=January 2024
main.benefit.amount=5000
child.benefit.amount=1500

# ============================================================
# Retry
# ============================================================
retry.count=1
